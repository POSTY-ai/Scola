<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        /* ====================================================
           CONTENEUR PRINCIPAL DE LA PAGE DE JEU
           ==================================================== */
        .jeu-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ====================================================
           BARRE DU HAUT — progression + timer
           ==================================================== */
        .jeu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }

        /* Numéro de question ex: "Question 3 / 10" */
        .jeu-compteur {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
        }

        /* Barre de progression verte qui avance à chaque question */
        .jeu-progress-wrap {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .jeu-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 99px;
            /* transition = animation fluide quand la barre avance */
            transition: width 0.4s ease;
            width: 0%;
        }

        /* Timer circulaire */
        .jeu-timer {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            flex-shrink: 0;
            /* transition de couleur quand le temps est court */
            transition: border-color 0.3s, color 0.3s;
        }

        /* Timer rouge quand il reste moins de 5 secondes */
        .jeu-timer.urgent {
            border-color: #ff4757;
            color: #ff4757;
        }

        /* ====================================================
           CARTE DE QUESTION
           ==================================================== */
        .jeu-carte {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 35px 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* Thème de la semaine affiché au dessus de la question */
        .jeu-theme {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        /* Texte de la question */
        .jeu-question {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            font-weight: 600;
            line-height: 1.5;
            color: #ffffff;
        }

        /* ====================================================
           BOUTONS DE RÉPONSE (A, B, C, D)
           ==================================================== */
        .jeu-reponses {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .jeu-reponse-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            width: 100%;
        }

        .jeu-reponse-btn:hover:not(:disabled) {
            background: rgba(102,126,234,0.2);
            border-color: rgba(102,126,234,0.5);
            transform: translateX(4px);
        }

        /* Lettre A / B / C / D dans un cercle */
        .jeu-lettre {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }

        /* ✅ Bonne réponse — vert */
        .jeu-reponse-btn.correct {
            background: rgba(46,213,115,0.2);
            border-color: #2ed573;
        }

        .jeu-reponse-btn.correct .jeu-lettre {
            background: #2ed573;
            color: #1a1a2e;
        }

        /* ❌ Mauvaise réponse — rouge */
        .jeu-reponse-btn.incorrect {
            background: rgba(255,71,87,0.2);
            border-color: #ff4757;
        }

        .jeu-reponse-btn.incorrect .jeu-lettre {
            background: #ff4757;
            color: #ffffff;
        }

        /* Désactivé après qu'une réponse est choisie */
        .jeu-reponse-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* ====================================================
           FEEDBACK — message après la réponse
           ==================================================== */
        .jeu-feedback {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none; /* caché par défaut, affiché après réponse */
        }

        .jeu-feedback.correct {
            background: rgba(46,213,115,0.15);
            border: 1px solid #2ed573;
            color: #2ed573;
        }

        .jeu-feedback.incorrect {
            background: rgba(255,71,87,0.15);
            border: 1px solid #ff4757;
            color: #ff4757;
        }

        /* ====================================================
           BOUTON SUIVANT
           ==================================================== */
        .jeu-suivant-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: none; /* caché jusqu'à ce qu'une réponse soit choisie */
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .jeu-suivant-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }

        /* ====================================================
           ÉCRAN DE RÉSULTATS FINAL
           ==================================================== */
        .jeu-resultats {
            display: none; /* caché pendant le jeu, affiché à la fin */
            text-align: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
        }

        .jeu-resultats-emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .jeu-resultats-titre {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .jeu-resultats-score {
            font-size: 48px;
            font-weight: 900;
            color: #667eea;
            margin: 20px 0;
        }

        .jeu-resultats-xp {
            font-size: 20px;
            color: #2ed573;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* Grille de stats en bas des résultats */
        .jeu-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .jeu-stat {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 14px;
        }

        .jeu-stat-val {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
        }

        .jeu-stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        /* Boutons en bas des résultats */
        .jeu-resultats-boutons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-rejouer {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-rejouer:hover { transform: translateY(-2px); }

        .btn-ligue {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: background 0.2s;
        }

        .btn-ligue:hover { background: rgba(255,255,255,0.1); }
    </style>

<body>
    <div class="jeu-container">

        <!-- ================================================ -->
        <!-- EN-TÊTE DU JEU — progression + timer             -->
        <!-- ================================================ -->
        <div class="jeu-header">
            <div class="jeu-compteur" id="jeu-compteur">Question 1 / 10</div>
            <div class="jeu-progress-wrap">
                <!-- La largeur de cette barre augmente à chaque question -->
                <div class="jeu-progress-bar" id="jeu-progress"></div>
            </div>
            <!-- Timer : compte à rebours de 20 secondes par question -->
            <div class="jeu-timer" id="jeu-timer">15</div>
        </div>

        <!-- ================================================ -->
        <!-- ZONE DE JEU — question + réponses                -->
        <!-- Cachée quand l'écran de résultats s'affiche      -->
        <!-- ================================================ -->
        <div id="jeu-zone">
            <!-- Carte contenant la question -->
            <div class="jeu-carte">
                <div class="jeu-theme" id="jeu-theme">Gouvernements Haïtiens</div>
                <div class="jeu-question" id="jeu-question">Chargement...</div>
            </div>

            <!-- Les 4 boutons de réponse générés dynamiquement par JS -->
            <div class="jeu-reponses" id="jeu-reponses"></div>

            <!-- Feedback affiché après chaque réponse -->
            <div class="jeu-feedback" id="jeu-feedback"></div>

            <!-- Bouton pour passer à la question suivante -->
            <button class="jeu-suivant-btn" id="jeu-suivant" onclick="questionSuivante()">
                Question suivante <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <!-- ================================================ -->
        <!-- ÉCRAN DE RÉSULTATS — affiché à la fin du quiz    -->
        <!-- ================================================ -->
        <div class="jeu-resultats" id="jeu-resultats">
            <div class="jeu-resultats-emoji" id="res-emoji">🎉</div>
            <div class="jeu-resultats-titre" id="res-titre">Session terminée !</div>
            <div class="jeu-resultats-score" id="res-score">0 / 10</div>
            <div class="jeu-resultats-xp" id="res-xp">+0 XP gagnés</div>

            <div class="jeu-stats">
                <div class="jeu-stat">
                    <div class="jeu-stat-val" id="res-bonnes">0</div>
                    <div class="jeu-stat-label">✅ Bonnes</div>
                </div>
                <div class="jeu-stat">
                    <div class="jeu-stat-val" id="res-mauvaises">0</div>
                    <div class="jeu-stat-label">❌ Mauvaises</div>
                </div>
                <div class="jeu-stat">
                    <div class="jeu-stat-val" id="res-temps">0s</div>
                    <div class="jeu-stat-label">⏱ Temps moy.</div>
                </div>
            </div>

            <div class="jeu-resultats-boutons">
                
                <a href="liguebac.html" class="btn-ligue">
                    <i class="fa-solid fa-trophy"></i>&nbsp; Voir le classement
                </a>
            </div>
        </div>

    </div>

// Vérification accès avant jeu
async function verifierAccesAvantJeu() {
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "register.html";
        return;
    }
    try {
        const response = await fetch("/api/quiz/check", {
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await response.json();
        if (!data.canPlay) {
            document.body.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;
                justify-content:center;min-height:100vh;font-family:Inter,sans-serif;
                background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
                color:white;text-align:center;padding:20px;">
                    <div style="font-size:64px;margin-bottom:20px;">⏳</div>
                    <h1 style="font-size:24px;font-weight:800;margin-bottom:12px;">
                        Tu as déjà joué aujourd'hui !
                    </h1>
                    <p style="font-size:15px;color:rgba(255,255,255,0.6);
                    max-width:360px;line-height:1.6;margin-bottom:32px;">
                        Reviens demain pour continuer à gagner des XP. 🔥
                    </p>
                    <a href="liguebac.html" style="padding:14px 28px;
                    background:linear-gradient(135deg,#667eea,#764ba2);
                    border-radius:14px;color:white;text-decoration:none;
                    font-size:15px;font-weight:700;">
                        Voir mon classement
                    </a>
                </div>`;
            window.history.replaceState(null, "", "liguebac.html");
            return;
        }
        initialiserJeu();
    } catch (err) {
        console.log("❌ Erreur vérification :", err);
        initialiserJeu();
    }
}

verifierAccesAvantJeu();

    4: "Influence des USA sur Haïti",
    5: "Influence des USA sur le monde"
};

function getThemeDuJour() {
    const jour = new Date().getDay();
    return THEMES_SEMAINE[jour] || THEMES_SEMAINE[1];
}

const THEMES_SEMAINE_3 = {
    1: "Bilan de la Première Guerre Mondiale",
    2: "Domination des USA (économique, culturelle, militaire)",
    3: "Le Plan Marshall",
    4: "Influence des USA sur Haïti",
    5: "Influence des USA sur le monde"
};

function getThemeDuJour() {
    const jour = new Date().getDay();
    return THEMES_SEMAINE_3[jour] || "Bilan de la Première Guerre Mondiale";
}
 // Fin de banqueQuestions


// Une seule fonction melangerTableau
function melangerTableau(tab) {
    const c = [...tab];
    for (let i = c.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [c[i], c[j]] = [c[j], c[i]];
    }
    return c;
}

// Thème et questions du jour
const themeDuJour = getThemeDuJour();

// ============================================================
// VARIABLES D'ÉTAT
// ============================================================
let questions = [];
let indexQuestion = 0;
let score = 0;
let bonnesReponses = 0;
let mauvaisesReponses = 0;
let timer = null;
let secondes = 20;
let tempsTotal = 0;
let aRepondu = false;

// ============================================================
// INITIALISER LE JEU
// ============================================================
function initialiserJeu() {
    questions = melangerTableau(banqueQuestions[themeDuJour]).slice(0, 10);
    indexQuestion = 0;
    score = 0;
    bonnesReponses = 0;
    mauvaisesReponses = 0;
    tempsTotal = 0;
    aRepondu = false;
    document.getElementById('jeu-zone').style.display = 'block';
    document.getElementById('jeu-resultats').style.display = 'none';
    afficherQuestion();
}

// ============================================================
// AFFICHER UNE QUESTION
// ============================================================
function afficherQuestion() {
    aRepondu = false;
    const q = questions[indexQuestion];
    const lettres = ['A', 'B', 'C', 'D'];

    document.getElementById('jeu-compteur').textContent =
        `Question ${indexQuestion + 1} / ${questions.length}`;
    document.getElementById('jeu-progress').style.width =
        `${(indexQuestion / questions.length) * 100}%`;
    document.getElementById('jeu-theme').textContent = themeDuJour;
    document.getElementById('jeu-question').textContent = q.question;

    const conteneur = document.getElementById('jeu-reponses');
    conteneur.innerHTML = '';
    q.answers.forEach((reponse, index) => {
        const btn = document.createElement('button');
        btn.className = 'jeu-reponse-btn';
        btn.innerHTML = `
            <span class="jeu-lettre">${lettres[index]}</span>
            <span>${reponse}</span>
        `;
        btn.onclick = () => verifierReponse(index, btn, q.correct);
        conteneur.appendChild(btn);
    });

    document.getElementById('jeu-feedback').style.display = 'none';
    document.getElementById('jeu-suivant').style.display = 'none';
    demarrerTimer();
}

// ============================================================
// TIMER
// ============================================================
function demarrerTimer() {
    if (timer) clearInterval(timer);
    secondes = 20;
    const timerEl = document.getElementById('jeu-timer');
    timerEl.textContent = secondes;
    timerEl.classList.remove('urgent');

    timer = setInterval(() => {
        secondes--;
        tempsTotal++;
        timerEl.textContent = secondes;
        if (secondes <= 5) timerEl.classList.add('urgent');
        if (secondes <= 0) {
            clearInterval(timer);
            if (!aRepondu) tempEcoule();
        }
    }, 1000);
}

function tempEcoule() {
    aRepondu = true;
    mauvaisesReponses++;
    document.querySelectorAll('.jeu-reponse-btn').forEach(btn => btn.disabled = true);
    document.querySelectorAll('.jeu-reponse-btn')[questions[indexQuestion].correct]
        .classList.add('correct');
    afficherFeedback(false, "⏱ Temps écoulé ! Voici la bonne réponse.");
    document.getElementById('jeu-suivant').style.display = 'block';
}

// ============================================================
// VÉRIFIER LA RÉPONSE
// ============================================================
function verifierReponse(indexChoisi, btnChoisi, indexCorrect) {
    if (aRepondu) return;
    aRepondu = true;
    clearInterval(timer);

    const estCorrect = indexChoisi === indexCorrect;
    document.querySelectorAll('.jeu-reponse-btn').forEach(btn => btn.disabled = true);

    if (estCorrect) {
        btnChoisi.classList.add('correct');
        score++;
        bonnesReponses++;
        afficherFeedback(true, "✅ Bonne réponse !");
    } else {
        btnChoisi.classList.add('incorrect');
        mauvaisesReponses++;
        document.querySelectorAll('.jeu-reponse-btn')[indexCorrect].classList.add('correct');
        afficherFeedback(false, "❌ Mauvaise réponse.");
    }
    document.getElementById('jeu-suivant').style.display = 'block';
}

function afficherFeedback(estCorrect, message) {
    const feedback = document.getElementById('jeu-feedback');
    feedback.textContent = message;
    feedback.className = `jeu-feedback ${estCorrect ? 'correct' : 'incorrect'}`;
    feedback.style.display = 'block';
}

function questionSuivante() {
    indexQuestion++;
    if (indexQuestion < questions.length) afficherQuestion();
    else afficherResultats();
}

// ============================================================
// RÉSULTATS
// ============================================================
function afficherResultats() {
    clearInterval(timer);
    document.getElementById('jeu-zone').style.display = 'none';
    document.getElementById('jeu-resultats').style.display = 'block';

    const xpGagnes = (bonnesReponses * 10) + (bonnesReponses === 10 ? 20 : 0);
    let emoji = '😔';
    if (score >= 8) emoji = '🏆';
    else if (score >= 6) emoji = '🎉';
    else if (score >= 4) emoji = '👍';

    document.getElementById('res-emoji').textContent = emoji;
    document.getElementById('res-score').textContent = `${score} / ${questions.length}`;
    document.getElementById('res-xp').textContent = `+${xpGagnes} XP gagnés`;
    document.getElementById('res-bonnes').textContent = bonnesReponses;
    document.getElementById('res-mauvaises').textContent = mauvaisesReponses;
    document.getElementById('res-temps').textContent =
        `${Math.round(tempsTotal / questions.length)}s`;
    document.getElementById('jeu-progress').style.width = '100%';

    envoyerXP(xpGagnes);
}

// ============================================================
// ENVOYER XP
// ============================================================
async function envoyerXP(xpGagnes) {
    const token = localStorage.getItem('token');
    if (!token) return;
    try {
        const response = await fetch('/api/ajouter-xp', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ pointsGagnes: xpGagnes })
        });
        const data = await response.json();
        if (response.status === 403) return;
        console.log('✅ XP envoyés :', data.message);
    } catch (err) {
        console.log('❌ Erreur envoi XP :', err);
    }
}

function rejouer() {
    initialiserJeu();
}

</script>
